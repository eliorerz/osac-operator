apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: osac

labels:
- includeSelectors: true
  pairs:
    app: osac-console-proxy

resources:
- serviceaccount.yaml
- deployment.yaml
- service.yaml
- certificate.yaml
- apiservice.yaml
- clusterrole.yaml
- clusterrolebinding.yaml
- clusterrole-secret-reader.yaml
- rolebinding-secret-reader.yaml
- clusterrolebinding-auth-delegator.yaml

images:
- name: console-proxy
  newName: ghcr.io/osac-project/osac-operator
  newTag: latest
